<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validata GC - Input</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">VALIDATA GC</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="tips.html" class="nav-link">Tips</a>
            </div>
        </div>
    </nav>

    <!-- Input Page -->
    <main class="page-container">
        <h1 class="page-title">Fact Check Content</h1>
        
        <div class="card">
            <div class="input-group">
                <label for="newsText">Paste News Text</label>
                <textarea 
                    id="newsText" 
                    placeholder="Enter the news article or statement you want to verify..."
                    rows="10"
                ></textarea>
            </div>

            <div class="divider">
                <span>OR</span>
            </div>

            <div class="input-group">
                <label for="url">Paste URL</label>
                <input 
                    type="text" 
                    id="url" 
                    placeholder="https://example.com/article"
                />
            </div>

            <button class="btn btn-verify" onclick="startVerification()">VERIFY</button>
        </div>
    </main>

    <script src="../js/app.js"></script>

</body>
</html>
