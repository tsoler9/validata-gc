<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validata GC - Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .login-container {
            max-width: 28rem;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 5rem);
        }
        .login-card {
            background: white;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 3rem 2.5rem;
            text-align: center;
            width: 100%;
        }
        .login-logo {
            font-size: 1.75rem;
            font-weight: 700;
            color: #2563eb;
            margin-bottom: 0.5rem;
        }
        .login-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 0.5rem;
        }
        .login-subtitle {
            color: #6b7280;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: white;
            border: 2px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            color: #374151;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            margin-bottom: 1rem;
        }
        .google-btn:hover {
            border-color: #2563eb;
            background: #f9fafb;
        }
        .google-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .guest-btn {
            display: block;
            width: 100%;
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-decoration: none;
            text-align: center;
        }
        .guest-btn:hover {
            border-color: #9ca3af;
            color: #374151;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1rem 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }
        .divider span { color: #9ca3af; font-size: 0.85rem; }
        .domain-note {
            margin-top: 1.5rem;
            padding: 0.75rem 1rem;
            background: #eff6ff;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            color: #1d4ed8;
            line-height: 1.5;
        }
        .error-msg {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: #fee2e2;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            color: #991b1b;
            display: none;
        }
        .guest-note {
            margin-top: 0.5rem;
            font-size: 0.78rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">VALIDATA GC</a>
        </div>
    </nav>

    <main class="login-container">
        <div class="login-card">
            <div class="login-logo">VALIDATA GC</div>
            <h1 class="login-title">Sign in to your account</h1>
            <p class="login-subtitle">Use your Gordon College email to access all features</p>

            <button class="google-btn" id="googleSignInBtn">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Sign in with Google
            </button>

            <div id="errorMsg" class="error-msg"></div>

            <div class="divider"><span>or</span></div>

            <a href="index.html" class="guest-btn">Continue without account</a>
            <p class="guest-note">⚠ Verification history won't be saved as a guest</p>

            <div class="domain-note">
                Only <strong>@gordoncollege.edu.ph</strong> accounts are allowed.<br>
                No sign up needed — just use your school email.
            </div>
        </div>
    </main>

    <script type="module">
        import { auth, signInWithGoogle } from "../js/firebase.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

        const ALLOWED_DOMAIN = "@gordoncollege.edu.ph";
        const btn = document.getElementById("googleSignInBtn");
        const errorMsg = document.getElementById("errorMsg");

        const googleBtnHTML = `<svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg> Sign in with Google`;

        
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                if (user.email && user.email.endsWith(ALLOWED_DOMAIN)) {
                    // Valid school account — go to home
                    window.location.href = "index.html";
                } else {
                    // Wrong account — sign them out and stay on login page
                    await signOut(auth);
                }
            }
        });

        btn.addEventListener("click", async () => {
            btn.disabled = true;
            btn.textContent = "Signing in...";
            errorMsg.style.display = "none";

            const user = await signInWithGoogle();

            if (user && user.email && user.email.endsWith(ALLOWED_DOMAIN)) {
                // Redirect handled by onAuthStateChanged above
            } else {
                errorMsg.textContent = "Access denied. Only @gordoncollege.edu.ph accounts are allowed.";
                errorMsg.style.display = "block";
                btn.disabled = false;
                btn.innerHTML = googleBtnHTML;
            }
        });
    </script>
</body>
</html>
